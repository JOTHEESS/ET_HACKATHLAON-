name: tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      # Light deps only: the graph/eval/viz tests run on these; tests that
      # need chromadb/anthropic skip themselves (run the full suite locally).
      - run: pip install networkx pyvis pytest
      - run: python -m pytest tests/ -v
